<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Pulilan Health Center</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f8fafc;
}

/* NAVBAR */
.navbar{
background:white;
padding:14px 60px;
border-bottom:3px solid #1e40af;
}

.nav-container{
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

/* HOME LINK */
.home-link{
font-weight:600;
color:#2563eb;
text-decoration:none;
font-size:16px;
transition:0.2s;
white-space:nowrap;
}

.home-link:hover{
color:black;
}

/* LOGIN SECTION */
.login-section{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.login-card{
background:white;
padding:40px;
border-radius:14px;
width:100%;
max-width:430px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* LOGIN HEADER */
.login-header{
display:flex;
align-items:center;
gap:12px;
margin-bottom:25px;
}

.login-header h4{
margin:0;
font-weight:600;
}

.login-header small{
color:#6b7280;
}

/* FORM */
.form-label{
font-weight:500;
}

.form-control{
padding:12px;
padding-right:45px;
border-radius:8px;
font-size:15px;
}

.password-box{
position:relative;
}

.password-box i{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:#6b7280;
font-size:15px;
}

.password-box i:hover{
color:#1e40af;
}

/* CAPS WARNING */
#capsWarning{
font-size:13px;
color:red;
display:none;
margin-top:5px;
}

/* MESSAGES */
.error-msg{
color:#dc2626;
background:#fee2e2;
padding:10px;
border-radius:6px;
}

.success-msg{
color:#065f46;
background:#d1fae5;
padding:10px;
border-radius:6px;
}

/* BUTTON */
.btn-main{
background:#1e40af;
color:white;
border:none;
padding:14px;
border-radius:8px;
font-weight:600;
width:100%;
margin-top:10px;
font-size:17px;
}

.btn-main:hover{
background:#1d4ed8;
}

/* REGISTER */
.register-link{
text-align:center;
margin-top:18px;
font-size:14px;
}

.register-link a{
color:#1e40af;
font-weight:600;
text-decoration:none;
}

.register-link a:hover{
text-decoration:underline;
}

/* FORGOT PASSWORD MODAL */
.modal-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(3px);
align-items:center;
justify-content:center;
z-index:2000;
padding:16px;
}

.reset-card{
background:white;
padding:30px;
border-radius:14px;
width:100%;
max-width:370px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
text-align:center;
}

.reset-card h5{
font-weight:600;
margin-bottom:10px;
}

.reset-desc{
font-size:14px;
color:#6b7280;
margin-bottom:20px;
}

.reset-input{
padding:12px;
margin-bottom:15px;
border-radius:8px;
}

.reset-btn{
width:100%;
}

.cancel-btn{
margin-top:10px;
background:none;
border:none;
color:#6b7280;
cursor:pointer;
font-size:14px;
}

.cancel-btn:hover{
color:black;
}

.reset-message{
margin-top:10px;
font-size:14px;
}

/* REMOVE BROWSER PASSWORD EYE */
input[type="password"]::-ms-reveal,
input[type="password"]::-ms-clear {
display:none;
}

input[type="password"]::-webkit-credentials-auto-fill-button,
input[type="password"]::-webkit-password-toggle-button {
display:none;
}

/* INPUT FOCUS */
.form-control:focus{
border-color:#1e40af;
box-shadow:0 0 0 3px rgba(30,64,175,0.15);
transition:0.2s;
}

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */

@media (max-width: 768px) {
  .navbar { padding: 14px 20px; }
}

@media (max-width: 480px) {
  .navbar { padding: 12px 16px; }

  .logo-area img { width: 40px; height: 40px; }
  .logo-area strong { font-size: 14px; }
  .logo-area small { font-size: 11px; }

  .home-link { font-size: 14px; }

  .login-card {
    padding: 28px 20px;
    border-radius: 12px;
  }

  .login-header img { width: 44px; height: 44px; }
  .login-header h4 { font-size: 17px; }

  .btn-main { font-size: 15px; padding: 13px; }
}

@media (max-width: 360px) {
  .login-card { padding: 22px 14px; }

  .login-header { gap: 8px; }
  .login-header img { width: 38px; height: 38px; }
  .login-header h4 { font-size: 15px; }

  .form-control { font-size: 14px; }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <div class="logo-area">
      <img src="images/logo.png" style="width:55px;height:55px;border-radius:10px;">
      <div>
        <strong>Pulilan Health Center</strong><br>
        <small>Appointment System</small>
      </div>
    </div>
    <a href="index.html" class="home-link">Home</a>
  </div>
</nav>

<!-- LOGIN SECTION -->
<section class="login-section">
  <div class="login-card">

    <div class="login-header">
      <img src="images/logo.png" style="width:55px;height:55px;border-radius:10px;">
      <div>
        <h4>Pulilan Health Center</h4>
        <small>Appointment System Login</small>
      </div>
    </div>

    <form id="loginForm">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" autocomplete="email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="password-box">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="off" required>
          <i class="fa-solid fa-eye" id="togglePassword"></i>
        </div>
        <div id="capsWarning">Caps Lock is ON</div>
      </div>

      <div class="form-check mb-2">
        <input class="form-check-input" type="checkbox" id="rememberMe">
        <label class="form-check-label">Remember Me</label>
      </div>

      <div style="text-align:right;margin-bottom:15px;font-size:14px;">
        <a href="#" id="forgotLink" style="color:#2563eb;text-decoration:none;">Forgot Password?</a>
      </div>

      <button class="btn-main" type="submit" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>

      <div id="loginMessage" style="margin-top:12px;font-size:14px;text-align:center;display:none;"></div>

    </form>

    <div class="register-link">
      Don't have an account?
      <a href="register.html">Register here</a>
    </div>

  </div>
</section>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal" class="modal-overlay">
  <div class="reset-card">
    <h5>Reset Password</h5>
    <p class="reset-desc">
      Enter your registered email address and we will send you a password reset link.
    </p>
    <input type="email" id="resetEmail" class="form-control reset-input" placeholder="Enter your email address">
    <button onclick="sendReset()" class="btn-main reset-btn">
      <i class="fa-solid fa-paper-plane"></i> Send Reset Link
    </button>
    <button onclick="closeModal()" class="cancel-btn">Cancel</button>
    <div id="resetMessage" class="reset-message"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* REMEMBER USER */
window.onload = function(){
  const savedUser = localStorage.getItem("rememberUser");
  if(savedUser){
    document.getElementById("email").value = savedUser;
  }
};

/* SHOW PASSWORD */
const togglePassword = document.getElementById("togglePassword");
const password = document.getElementById("password");

togglePassword.addEventListener("click", function(){
  const type = password.getAttribute("type") === "password" ? "text" : "password";
  password.setAttribute("type", type);
  this.classList.toggle("fa-eye-slash");
});

/* CAPS LOCK WARNING */
password.addEventListener("keyup", function(e){
  if(e.getModifierState("CapsLock")){
    document.getElementById("capsWarning").style.display = "block";
  } else {
    document.getElementById("capsWarning").style.display = "none";
  }
});

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const passwordValue = document.getElementById("password").value;
  const message = document.getElementById("loginMessage");
  const loginBtn = document.getElementById("loginBtn");

  const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  if(!email.match(emailPattern)){
    message.style.display = "block";
    message.className = "error-msg";
    message.innerHTML = "Please enter a valid email address.";
    return;
  }

  loginBtn.innerHTML = "Checking...";
  loginBtn.disabled = true;

  setTimeout(function(){
    if(email === "ashley@gmail.com" && passwordValue === "123456"){
      if(document.getElementById("rememberMe").checked){
        localStorage.setItem("rememberUser", email);
      }
      message.style.display = "block";
      message.className = "success-msg";
      message.innerHTML = "Login successful! Redirecting...";
      setTimeout(function(){
        window.location.href = "dashboard.html";
      }, 1500);
    } else {
      loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Login';
      loginBtn.disabled = false;
      message.style.display = "block";
      message.className = "error-msg";
      message.innerHTML = "Invalid email or password.";
    }
  }, 1000);
});

/* ENTER KEY LOGIN */
document.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    document.getElementById("loginForm").dispatchEvent(new Event("submit"));
  }
});

/* FORGOT PASSWORD */
const forgotLink = document.getElementById("forgotLink");
const modal = document.getElementById("forgotModal");

forgotLink.addEventListener("click", function(e){
  e.preventDefault();
  modal.style.display = "flex";
});

function closeModal(){
  modal.style.display = "none";
}

window.onclick = function(e){
  if(e.target === modal){
    modal.style.display = "none";
  }
}

function sendReset(){
  const email = document.getElementById("resetEmail").value;
  const message = document.getElementById("resetMessage");
  const input = document.getElementById("resetEmail");
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(email === ""){
    message.innerHTML = "Please enter your email.";
    message.style.color = "red";
    input.style.border = "2px solid red";
    return;
  }

  if(!emailPattern.test(email)){
    message.innerHTML = "Please enter a valid email address.";
    message.style.color = "red";
    input.style.border = "2px solid red";
    return;
  }

  input.style.border = "2px solid #22c55e";
  message.innerHTML = "Reset link sent to your email.";
  message.style.color = "green";
}

</script>
</body>
</html>
